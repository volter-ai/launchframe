name: Question
description: Ask a usage or integration question
title: "[Question]: "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: "<what are you trying to understand or accomplish?>"
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      placeholder: "<commands, docs, examples, or approaches already tried>"
  - type: textarea
    id: context
    attributes:
      label: Context
      placeholder: "<version, environment, repo link, relevant config>"

